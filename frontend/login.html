<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - Bandera Commerce</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <div class="logo">
      <i class="fas fa-tattoo logo-icon"></i>
      <h1>Bandera Commerce</h1>
    </div>
    <nav>
      <a href="/">Inicio</a>
      <a href="/productos">Productos</a>
      <a href="/carrito">Carrito <span class="cart-badge">0</span></a>
      <a href="/login">Iniciar Sesión</a>
      <a href="/registro">Registrarse</a>
    </nav>
  </header>

  <main>
    <div class="form-container">
      <h2 style="text-align: center; margin-bottom: 2rem;">Iniciar Sesión</h2>
      
      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" id="email" class="form-control" placeholder="tu@email.com">
      </div>
      
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="password" class="form-control" placeholder="********">
      </div>
      
      <button onclick="iniciarSesion()" class="btn btn-primary btn-full">
        <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
      </button>
      
      <p style="text-align: center; margin-top: 1.5rem;">
        ¿No tienes cuenta? <a href="/registro">Regístrate aquí</a>
      </p>
    </div>
  </main>

  <footer>
    <p>© 2024 Bandera Commerce - Todos los derechos reservados</p>
    <p><i class="fas fa-envelope"></i> banderacommerce@gmail.com | <i class="fas fa-phone"></i> 744 755 575</p>
  </footer>

  <script src="/script.js"></script>
</body>
</html>
