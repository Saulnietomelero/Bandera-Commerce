<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrarse - Bandera Commerce</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <div class="logo">
      <i class="fas fa-tattoo logo-icon"></i>
      <h1>Bandera Commerce</h1>
    </div>
    <nav>
      <a href="/"><i class="fas fa-home"></i> Inicio</a>
      <a href="/productos"><i class="fas fa-box"></i> Productos</a>
      <a href="/carrito"><i class="fas fa-shopping-cart"></i> Carrito <span class="cart-badge">0</span></a>
      <div id="userInfo"></div>
    </nav>
  </header>

  <main>
    <div class="form-container">
      <h2 style="text-align: center; margin-bottom: 2rem;">Crear Cuenta</h2>
      
      <div class="form-group">
        <label>Nombre completo *</label>
        <input type="text" id="name" class="form-control" placeholder="Tu nombre">
      </div>
      
      <div class="form-group">
        <label>Email *</label>
        <input type="email" id="email" class="form-control" placeholder="tu@email.com">
      </div>
      
      <div class="form-group">
        <label>Contraseña *</label>
        <input type="password" id="password" class="form-control" placeholder="********">
      </div>
      
      <div class="form-group">
        <label>Teléfono *</label>
        <input type="tel" id="phone" class="form-control" placeholder="600 000 000">
      </div>
      
      <div class="form-group">
        <label>Empresa (opcional)</label>
        <input type="text" id="company" class="form-control" placeholder="Nombre de tu estudio">
      </div>
      
      <button onclick="registrarse()" class="btn btn-primary btn-full">
        <i class="fas fa-user-plus"></i> Registrarse
      </button>
      
      <p style="text-align: center; margin-top: 1rem;">
        ¿Ya tienes cuenta? <a href="/login">Inicia Sesión</a>
      </p>
    </div>
  </main>

  <footer>
    <p>© 2024 Bandera Commerce - Todos los derechos reservados</p>
    <p><i class="fas fa-envelope"></i> banderacommerce@gmail.com | <i class="fas fa-phone"></i> 744 755 575</p>
  </footer>

  <script src="/script.js"></script>
</body>
</html>
