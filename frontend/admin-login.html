<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Bandera Commerce</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/style.css">
  <style>
    body { background: linear-gradient(135deg, #1a3a5f 0%, #2d4a7a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: white; border-radius: 16px; padding: 2rem; width: 100%; max-width: 400px; text-align: center; }
  </style>
</head>
<body>
  <div class="login-card">
    <i class="fas fa-crown fa-3x" style="color: #1a3a5f; margin-bottom: 1rem;"></i>
    <h2>Acceso Administrativo</h2>
    <p style="color: #6c757d; margin-bottom: 2rem;">Ingresa la contraseña de administrador</p>
    
    <div class="form-group">
      <input type="password" id="password" class="form-control" placeholder="Contraseña">
    </div>
    
    <button class="btn btn-primary btn-full" onclick="loginAdmin()">
      <i class="fas fa-sign-in-alt"></i> Acceder
    </button>
    
    <p style="margin-top: 1rem;"><a href="/">← Volver a la tienda</a></p>
  </div>

  <script>
    function loginAdmin() {
      const password = document.getElementById('password').value;
      if (password === 'LavadoraDeSamuel123#') {
        localStorage.setItem('admin_token', password);
        window.location.href = '/admin';
      } else {
        alert('Contraseña incorrecta');
      }
    }
  </script>
</body>
</html>
