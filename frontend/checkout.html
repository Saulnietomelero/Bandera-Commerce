<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finalizar Compra - Bandera Commerce</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <div class="logo">
      <i class="fas fa-tattoo logo-icon"></i>
      <h1>Bandera Commerce</h1>
    </div>
    <nav>
      <a href="/"><i class="fas fa-home"></i> Inicio</a>
      <a href="/productos"><i class="fas fa-box"></i> Productos</a>
      <a href="/carrito"><i class="fas fa-shopping-cart"></i> Carrito <span class="cart-badge">0</span></a>
      <div id="userInfo"></div>
    </nav>
  </header>

  <main>
    <div class="checkout-grid" id="checkoutForm">
      <div>
        <h2><i class="fas fa-truck"></i> Datos de Envío</h2>
        
        <div class="form-group">
          <label>Nombre completo *</label>
          <input type="text" id="nombre" class="form-control" readonly>
        </div>
        
        <div class="form-group">
          <label>Email *</label>
          <input type="email" id="email" class="form-control" readonly>
        </div>
        
        <div class="form-group">
          <label>Teléfono *</label>
          <input type="tel" id="telefono" class="form-control" placeholder="Tu teléfono de contacto">
        </div>
        
        <div class="form-group">
          <label>Empresa</label>
          <input type="text" id="empresa" class="form-control" placeholder="Nombre de tu estudio (opcional)">
        </div>
        
        <div class="form-group">
          <label>Dirección de envío *</label>
          <textarea id="direccion" class="form-control" rows="3" placeholder="Calle, número, ciudad, código postal..."></textarea>
        </div>
        
        <div class="form-group">
          <label>Método de pago</label>
          <select id="metodoPago" class="form-control">
            <option value="efectivo">💵 Efectivo contra reembolso</option>
            <option value="transferencia">🏦 Transferencia bancaria</option>
            <option value="tarjeta">💳 Tarjeta de crédito</option>
          </select>
        </div>
        
        <div class="form-group">
          <label>Notas del pedido</label>
          <textarea id="notas" class="form-control" rows="3" placeholder="¿Alguna observación?"></textarea>
        </div>
      </div>
      
      <div>
        <div class="checkout-summary">
          <h3><i class="fas fa-shopping-bag"></i> Resumen del Pedido</h3>
          <div id="resumenItems"></div>
          <div style="margin-top: 2rem;">
            <p>Subtotal: <strong id="resumenSubtotal">0.00</strong>€</p>
            <p>Envío: 5.99€</p>
            <h3>Total: <span id="resumenTotal">0.00</span>€</h3>
          </div>
          
          <button onclick="realizarPedido()" class="btn btn-success btn-full" style="margin-top: 1rem;">
            <i class="fas fa-check"></i> Confirmar Pedido
          </button>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <p>© 2024 Bandera Commerce - Todos los derechos reservados</p>
    <p><i class="fas fa-envelope"></i> banderacommerce@gmail.com | <i class="fas fa-phone"></i> 744 755 575</p>
  </footer>

  <script src="/script.js"></script>
</body>
</html>
